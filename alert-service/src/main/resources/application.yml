server:
  port: 8082

spring:
  application:
    name: alert-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: alert-service-group
      auto-offset-reset: earliest

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/frauddb}
    username: ${DB_USERNAME:fraud}
    password: ${DB_PASSWORD:fraud_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

kafka:
  topics:
    alerts: fraud-alerts

fraud:
  alert:
    redis-ttl-hours: 24
    recent-per-account: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.frauddetection: INFO
    org.apache.kafka: WARN
    io.lettuce: WARN
    org.hibernate.SQL: WARN
