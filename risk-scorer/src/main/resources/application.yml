server:
  port: 8081

spring:
  application:
    name: risk-scorer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: risk-scorer-group
      auto-offset-reset: earliest
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

kafka:
  topics:
    transactions: transactions
    alerts: fraud-alerts

fraud:
  rules:
    high-amount-threshold: 10000
    velocity:
      max-transactions: 5
      window-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.frauddetection: INFO
    org.apache.kafka: WARN
    io.lettuce: WARN
