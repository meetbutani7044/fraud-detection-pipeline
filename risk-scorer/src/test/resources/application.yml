spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: risk-scorer-test-group
      auto-offset-reset: earliest
  data:
    redis:
      host: localhost
      port: 6370   # offset from default to avoid clashing with local Redis

kafka:
  topics:
    transactions: transactions
    alerts: fraud-alerts

fraud:
  rules:
    high-amount-threshold: 10000
    velocity:
      max-transactions: 5
      window-seconds: 60
