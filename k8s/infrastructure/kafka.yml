# Single-broker Kafka for dev/staging.
# For production HA use the Strimzi operator (https://strimzi.io) with 3+ brokers.
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  clusterIP: None   # headless — pods resolve kafka:9092 directly to the broker pod IP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: fraud-detection-pipeline
    spec:
      initContainers:
        - name: wait-for-zookeeper
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z zookeeper 2181; do echo waiting for zookeeper; sleep 2; done"]
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: broker
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
