---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: alert-service
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: alert-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alert-service
        app.kubernetes.io/part-of: fraud-detection-pipeline
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done"]
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: alert-service
          image: ghcr.io/meetbutani7044/fraud-detection-pipeline/alert-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
          envFrom:
            - configMapRef:
                name: fraud-detection-config
            - secretRef:
                name: fraud-detection-secrets
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: alert-service
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  # LoadBalancer exposes the query API externally.
  # Change to ClusterIP if fronted by an ingress controller.
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: alert-service
  ports:
    - name: http
      port: 80
      targetPort: 8082

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alert-service-hpa
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: alert-service
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alert-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
