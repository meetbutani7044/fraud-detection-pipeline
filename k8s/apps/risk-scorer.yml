---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-scorer
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: risk-scorer
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: risk-scorer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: risk-scorer
        app.kubernetes.io/part-of: fraud-detection-pipeline
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: risk-scorer
          image: ghcr.io/meetbutani7044/fraud-detection-pipeline/risk-scorer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: risk-scorer
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: risk-scorer
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: risk-scorer
  ports:
    - name: http
      port: 8081
      targetPort: 8081

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: risk-scorer-hpa
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: risk-scorer
    app.kubernetes.io/part-of: fraud-detection-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: risk-scorer
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
